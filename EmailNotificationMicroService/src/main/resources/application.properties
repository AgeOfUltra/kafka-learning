spring.application.name=EmailNotificationMicroService
server.port=0
spring.kafka.consumer.bootstrap-servers=localhost:9092,localhost:9094
#spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=product-created-events
spring.kafka.consumer.properties.spring.json.trusted.package=com.microservicecore.ws.core


## Add this to see ALL kafka internals
#logging.level.org.springframework.kafka=DEBUG
#logging.level.org.apache.kafka=WARN

#H2 configuration
spring.datasource.username=h2
spring.datasource.password=

spring.datasource.url=jdbc:h2:mem:demodb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#  // this will tell hibernate how to generate SQL queries compactable to H2
spring.h2.console.enabled=true